# Request bodies for POST /v1/agent-profiles/<profile-id>/versions.
---
# bug-finder
version: 1
definition:
  schemaVersion: 1
  runtime:
    type: opencode
    agent: audit
    opencodeConfig:
      model: gateway/claude-opus-4-7
      mcp:
        github: { type: remote, url: "http://127.0.0.1:8083/", enabled: true, oauth: false }
      permission: { "github_*": deny }
      agent:
        audit:
          prompt: >-
            Audit the exact checked-out revision for one concrete correctness bug. Focus on recently changed code and
            reachable failure paths. Search open and recently closed issues and open pull requests before reporting.
            Create at most one issue, and only when you have strong mechanical evidence, a reproduction, or a precise
            failing-test design. Do not report style, refactoring, documentation, or speculative performance concerns.
            The issue must include affected paths and symbols, failure path, expected and actual behavior, reproduction
            evidence, the audited commit SHA from the event, and a stable finding fingerprint. If there is no credible
            novel finding, create nothing and finish successfully. Never modify code, branches, pull requests, or reviews.
          permission:
            github_search_issues: allow
            github_issue_read: allow
            github_issue_write: allow
            github_pull_request_read: allow
            github_get_file_contents: allow
            github_search_code: allow
            github_get_commit: allow
            github_list_commits: allow
            github_actions_list: allow
            github_actions_get: allow
            github_get_job_logs: allow
  sandbox: { templateName: opencode-bug-finder-template, warmPool: opencode-bug-finder-pool }
  connections: [{ id: github-production, sidecar: github-token-broker }]
  permissions: { onRequest: fail }
  retention: { sandboxSecondsAfterFinished: 0 }
  timeoutSeconds: 1800
---
version: 1
definition:
  schemaVersion: 1
  runtime:
    type: opencode
    agent: triage
    opencodeConfig:
      model: anthropic/claude-sonnet
      mcp:
        github: { type: remote, url: "http://127.0.0.1:8083/", enabled: true, oauth: false }
      permission: { "github_*": deny }
      agent:
        triage:
          prompt: Classify the issue, apply one agentbay/difficulty label, then apply agentbay/state:ready.
          permission:
            github_search_issues: allow
            github_issue_read: allow
            github_issue_write: allow
            github_add_issue_comment: allow
            github_get_label: allow
            github_list_label: allow
  sandbox: { templateName: opencode-triager-template, warmPool: opencode-triager-pool }
  connections: [{ id: github-production, sidecar: github-token-broker }]
  permissions: { onRequest: fail }
  timeoutSeconds: 900
---
# developer-easy. Publish equivalent developer-medium and developer-hard
# versions using gateway/claude-opus-4-7 and gateway/claude-fable-5.
version: 1
definition:
  schemaVersion: 1
  runtime:
    type: opencode
    agent: develop
    opencodeConfig:
      model: gateway/claude-sonnet-5
      mcp:
        github: { type: remote, url: "http://127.0.0.1:8083/", enabled: true, oauth: false }
      permission: { "github_*": deny }
      agent:
        develop:
          prompt: Implement the issue, verify the change, and open a pull request using GitHub MCP tools.
          permission:
            github_issue_read: allow
            github_get_file_contents: allow
            github_search_code: allow
            github_get_commit: allow
            github_list_commits: allow
            github_create_branch: allow
            github_push_files: allow
            github_create_pull_request: allow
            github_pull_request_read: allow
            github_actions_list: allow
            github_actions_get: allow
            github_get_job_logs: allow
  sandbox: { templateName: opencode-developer-template, warmPool: opencode-developer-pool }
  connections: [{ id: github-production, sidecar: github-token-broker }]
  permissions: { onRequest: fail }
  timeoutSeconds: 3600
---
version: 1
definition:
  schemaVersion: 1
  runtime:
    type: opencode
    agent: review
    opencodeConfig:
      model: anthropic/claude-sonnet
      mcp:
        github: { type: remote, url: "http://127.0.0.1:8083/", enabled: true, oauth: false }
      permission: { "github_*": deny }
      agent:
        review:
          prompt: >-
            Review the pull request for correctness and regressions, taking the completed workflowRun conclusion and
            check logs into account. Submit a native GitHub review through github_pull_request_review_write with
            method=create. Use event=APPROVE only when no blocking changes remain and CI succeeded, or
            event=REQUEST_CHANGES with a substantive body when code or CI changes are required. Set commitID to the exact
            pull request head SHA being reviewed. Do not submit COMMENT as the final verdict.
          permission:
            github_pull_request_read: allow
            github_get_file_contents: allow
            github_get_commit: allow
            github_pull_request_review_write: allow
            github_add_comment_to_pending_review: allow
            github_add_reply_to_pull_request_comment: allow
            github_actions_get: allow
            github_actions_list: allow
            github_get_job_logs: allow
  sandbox: { templateName: opencode-reviewer-template, warmPool: opencode-reviewer-pool }
  connections: [{ id: github-reviewer, sidecar: github-token-broker }]
  permissions: { onRequest: fail }
  timeoutSeconds: 1800
---
version: 1
definition:
  schemaVersion: 1
  runtime:
    type: opencode
    agent: merge
    opencodeConfig:
      model: gateway/claude-sonnet-5
      mcp:
        github: { type: remote, url: "http://127.0.0.1:8083/", enabled: true, oauth: false }
      permission: { "github_*": deny }
      agent:
        merge:
          prompt: >-
            Merge only the pull request identified by the trusted event. Read the pull request and its reviews first.
            Require it to be open and non-draft, require its current head SHA to equal review.commitSha, and require the
            review from review.user.id to be APPROVED for that exact SHA. Then call github_merge_pull_request with
            merge_method=merge. Do not modify the pull request or repository. If any invariant fails or GitHub rejects
            the merge because repository protection is not satisfied, stop without merging.
          permission:
            github_pull_request_read: allow
            github_merge_pull_request: allow
  sandbox: { templateName: opencode-merger-template, warmPool: opencode-merger-pool }
  connections: [{ id: github-production, sidecar: github-token-broker }]
  permissions: { onRequest: fail }
  timeoutSeconds: 900
