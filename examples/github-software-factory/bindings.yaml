# Request body for POST /v1/bindings/triage-issues/versions.
---
version: 1
triggerId: engineering-github
profile: { id: triager, version: 1 }
definition:
  schemaVersion: 1
  eventTypes: [com.github.issues.opened]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
  prompt: { literal: Triage the new issue., includeEvent: data }
  workspace: { type: empty }
---
# Publish this document once per difficulty, changing both the required label
# and exact profile ID. The ready label prevents dispatch on intermediate label
# deliveries.
version: 1
triggerId: engineering-github
profile: { id: developer-easy, version: 1 }
definition:
  schemaVersion: 1
  eventTypes: [com.github.issues.labeled]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
      - { path: /issue/labels, op: contains, value: "agentbay/state:ready" }
      - { path: /issue/labels, op: contains, value: "agentbay/difficulty:easy" }
  activeSingleton:
    name: developer-issue
    key: [/repository/id, /issue/number]
  prompt: { literal: Implement the ready issue and open a pull request., includeEvent: data }
  workspace:
    type: git
    repository: { url: { path: /repository/cloneUrl } }
    revision: { commit: { path: /repository/defaultBranchRevision/commit } }
  afterTurn:
    disposition: wait
    wait:
      name: developer-pr-lifecycle
      correlation:
        - { name: repositoryId, source: event, path: /repository/id }
        - { name: pullRequestNumber, source: supplied, slot: primaryPullRequestNumber }
      deadlineSeconds: 604800
      admitWhileBusy: true
---
version: 1
triggerId: engineering-github
profile: { id: developer-easy, version: 1 }
definition:
  schemaVersion: 1
  disposition: wake
  eventTypes: [com.github.pull_request_review.submitted]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
      - { path: /review/agentbayVerdict, op: eq, value: changes_requested }
  wake:
    waitName: developer-pr-lifecycle
    delivery: active-or-coalesced
    correlation:
      - { name: repositoryId, path: /repository/id }
      - { name: pullRequestNumber, path: /pullRequest/number }
    action:
      type: continue
      prompt: { literal: Address the requested pull request changes., includeEvent: data }
      workspace:
        type: git
        repository: { url: { path: /pullRequest/head/repository/cloneUrl } }
        revision: { commit: { path: /pullRequest/head/sha } }
---
version: 1
triggerId: engineering-github
profile: { id: developer-easy, version: 1 }
definition:
  schemaVersion: 1
  disposition: wake
  eventTypes: [com.github.pull_request.closed]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
      - { path: /pullRequest/merged, op: eq, value: true }
  wake:
    waitName: developer-pr-lifecycle
    delivery: active-or-coalesced
    correlation:
      - { name: repositoryId, path: /repository/id }
      - { name: pullRequestNumber, path: /pullRequest/number }
    action: { type: complete }
---
version: 1
triggerId: engineering-github
profile: { id: reviewer, version: 1 }
definition:
  schemaVersion: 1
  eventTypes: [com.github.pull_request.opened]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
  prompt: { literal: Review this pull request revision., includeEvent: data }
  workspace:
    type: git
    repository: { url: { path: /pullRequest/head/repository/cloneUrl } }
    revision: { commit: { path: /pullRequest/head/sha } }
  afterTurn:
    disposition: wait
    wait:
      name: reviewer-pr-lifecycle
      correlation:
        - { name: repositoryId, path: /repository/id }
        - { name: pullRequestNumber, path: /pullRequest/number }
      deadlineSeconds: 604800
      admitWhileBusy: true
---
version: 1
triggerId: engineering-github
profile: { id: reviewer, version: 1 }
definition:
  schemaVersion: 1
  disposition: wake
  eventTypes: [com.github.pull_request.synchronize]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
  wake:
    waitName: reviewer-pr-lifecycle
    delivery: active-or-coalesced
    correlation:
      - { name: repositoryId, path: /repository/id }
      - { name: pullRequestNumber, path: /pullRequest/number }
    action:
      type: continue
      prompt: { literal: Review the latest pull request revision., includeEvent: data }
      workspace:
        type: git
        repository: { url: { path: /pullRequest/head/repository/cloneUrl } }
        revision: { commit: { path: /pullRequest/head/sha } }
---
version: 1
triggerId: engineering-github
profile: { id: reviewer, version: 1 }
definition:
  schemaVersion: 1
  disposition: wake
  eventTypes: [com.github.pull_request.closed]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
      - { path: /pullRequest/merged, op: eq, value: true }
  wake:
    waitName: reviewer-pr-lifecycle
    delivery: active-or-coalesced
    correlation:
      - { name: repositoryId, path: /repository/id }
      - { name: pullRequestNumber, path: /pullRequest/number }
    action: { type: complete }
