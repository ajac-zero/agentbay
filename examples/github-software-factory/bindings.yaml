# Request body for POST /v1/bindings/triage-issues/versions.
---
# POST /v1/bindings/hourly-bug-finder/versions
version: 1
triggerId: hourly-bug-finder
profile: { id: bug-finder, version: 1 }
definition:
  schemaVersion: 1
  eventTypes: [dev.agentbay.schedule.triggered]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
  activeSingleton:
    name: scheduled-bug-finder
    key: [/repository/id]
  checkpoint:
    name: repository-audit
    key: [/repository/id]
    value: { path: /repository/defaultBranchRevision/commit }
    advanceOn: succeeded
    unchanged: skip
  prompt: { literal: Audit this exact scheduled repository revision for one novel concrete bug., includeEvent: data }
  workspace:
    type: git
    repository: { url: { path: /repository/cloneUrl } }
    revision: { commit: { path: /repository/defaultBranchRevision/commit } }
---
version: 1
triggerId: engineering-github
profile: { id: triager, version: 1 }
definition:
  schemaVersion: 1
  eventTypes: [com.github.issues.opened]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
  prompt: { literal: Triage the new issue., includeEvent: data }
  workspace: { type: empty }
---
# Publish this document once per difficulty, changing both the required label
# and exact profile ID. The ready label prevents dispatch on intermediate label
# deliveries.
version: 1
triggerId: engineering-github
profile: { id: developer-easy, version: 1 }
definition:
  schemaVersion: 1
  eventTypes: [com.github.issues.labeled]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
      - { path: /issue/labels, op: contains, value: "agentbay/state:ready" }
      - { path: /issue/labels, op: contains, value: "agentbay/difficulty:easy" }
  activeSingleton:
    name: developer-issue
    key: [/repository/id, /issue/number]
  prompt: { literal: Implement the ready issue and open a pull request., includeEvent: data }
  workspace:
    type: git
    repository: { url: { path: /repository/cloneUrl } }
    revision: { commit: { path: /repository/defaultBranchRevision/commit } }
  afterTurn:
    disposition: wait
    wait:
      name: developer-pr-lifecycle
      correlation:
        - { name: repositoryId, source: event, path: /repository/id }
        - { name: pullRequestNumber, source: supplied, slot: primaryPullRequestNumber }
      deadlineSeconds: 604800
      admitWhileBusy: true
---
version: 1
triggerId: engineering-github
profile: { id: developer-easy, version: 1 }
definition:
  schemaVersion: 1
  disposition: wake
  eventTypes: [com.github.pull_request_review.submitted]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
      - { path: /review/state, op: eq, value: changes_requested }
      # Replace with the numeric bot user ID from the reviewer App's signed review webhook.
      - { path: /review/user/id, op: eq, value: 987654321 }
  wake:
    waitName: developer-pr-lifecycle
    delivery: active-or-coalesced
    correlation:
      - { name: repositoryId, path: /repository/id }
      - { name: pullRequestNumber, path: /pullRequest/number }
    action:
      type: continue
      prompt: { literal: Address the requested pull request changes., includeEvent: data }
      workspace:
        type: git
        repository: { url: { path: /pullRequest/head/repository/cloneUrl } }
        revision: { commit: { path: /pullRequest/head/sha } }
---
version: 1
triggerId: engineering-github
profile: { id: developer-easy, version: 1 }
definition:
  schemaVersion: 1
  disposition: wake
  eventTypes: [com.github.pull_request.closed]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
      - { path: /pullRequest/merged, op: eq, value: true }
  wake:
    waitName: developer-pr-lifecycle
    delivery: active-or-coalesced
    correlation:
      - { name: repositoryId, path: /repository/id }
      - { name: pullRequestNumber, path: /pullRequest/number }
    action: { type: complete }
---
version: 1
triggerId: engineering-github
profile: { id: reviewer, version: 1 }
definition:
  schemaVersion: 1
  eventTypes: [com.github.workflow_run.completed]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
      - { path: /workflowRun/name, op: eq, value: CI }
      - { path: /workflowRun/event, op: eq, value: pull_request }
      - { path: /workflowRun/status, op: eq, value: completed }
      # Verified Dependabot npm patch/minor updates use the deterministic fast lane.
      - { path: /workflowRun/headBranch, op: notStartsWith, value: "dependabot/" }
  activeSingleton:
    name: reviewer-revision
    key: [/repository/id, /pullRequest/number, /pullRequest/head/sha]
  prompt: { literal: Review this pull request revision and its completed CI result., includeEvent: data }
  workspace:
    type: git
    repository: { url: { path: /pullRequest/head/repository/cloneUrl } }
    revision: { commit: { path: /pullRequest/head/sha } }
---
version: 1
triggerId: engineering-github
profile: { id: reviewer, version: 1 }
definition:
  schemaVersion: 1
  eventTypes: [com.github.pull_request.labeled]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
      - { path: /pullRequest/labels, op: contains, value: agentbay-review }
  activeSingleton:
    name: reviewer-revision
    key: [/repository/id, /pullRequest/number, /pullRequest/head/sha]
  prompt: { literal: Review this dependency pull request because it was ineligible for deterministic approval., includeEvent: data }
  workspace:
    type: git
    repository: { url: { path: /pullRequest/head/repository/cloneUrl } }
    revision: { commit: { path: /pullRequest/head/sha } }
---
version: 1
triggerId: engineering-github
profile: { id: merger, version: 1 }
definition:
  schemaVersion: 1
  eventTypes: [com.github.pull_request_review.submitted]
  filter:
    all:
      - { path: /repository/fullName, op: eq, value: acme/agentbay }
      - { path: /review/state, op: eq, value: approved }
      # Replace with the numeric bot user ID from the reviewer App's signed review webhook.
      # Reviewer App bot and github-actions[bot] deterministic fast-lane actor IDs.
      - { path: /review/user/id, op: in, values: [987654321, 41898282] }
      - { path: /review/commitSha, op: exists, value: true }
      - { path: /pullRequest/merged, op: eq, value: false }
  prompt: { literal: Validate the approved revision and merge it through repository protection., includeEvent: data }
  workspace: { type: empty }
