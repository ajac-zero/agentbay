apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentbay-reconciler
  namespace: agents
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agentbay-reconciler
        spec:
          serviceAccountName: agentbay-reconciler
          restartPolicy: OnFailure
          containers:
            - name: reconciler
              image: ghcr.io/example/agentbay:latest
              imagePullPolicy: IfNotPresent
              command: ["node", "dist/reconcile.js"]
              env:
                - name: AGENTBAY_KUBE_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: LOG_LEVEL
                  value: info
