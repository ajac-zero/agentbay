apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentbay-reconciler
  namespace: agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentbay-reconciler-sandboxclaims
  namespace: agents
rules:
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxclaims"]
    verbs: ["list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentbay-reconciler-sandboxclaims
  namespace: agents
subjects:
  - kind: ServiceAccount
    name: agentbay-reconciler
    namespace: agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agentbay-reconciler-sandboxclaims
