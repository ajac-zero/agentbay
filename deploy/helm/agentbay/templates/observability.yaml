{{- if .Values.observability.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "agentbay.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentbay.labels" . | nindent 4 }}
    {{- with .Values.observability.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "agentbay.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames: [{{ .Release.Namespace | quote }}]
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.observability.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.observability.serviceMonitor.scrapeTimeout | quote }}
---
{{- end }}
{{- if .Values.observability.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "agentbay.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentbay.labels" . | nindent 4 }}
    {{- with .Values.observability.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: agentbay.factory
      rules:
        - alert: AgentbayOutboxStuck
          expr: max by (tenant, topic) (agentbay_outbox_oldest_pending_age_seconds{topic=~{{ .Values.observability.prometheusRule.outboxTopicsRegex | quote }}}) > {{ .Values.observability.prometheusRule.outboxMaxAgeSeconds }}
          for: {{ .Values.observability.prometheusRule.for | quote }}
          labels: { severity: critical }
          annotations:
            summary: Agentbay outbox publication is stuck
            description: "The oldest pending message for topic {{ "{{ $labels.topic }}" }} is older than the configured threshold."
        - alert: AgentbayExecutionOverdue
          expr: sum by (tenant) (agentbay_executions_overdue) > 0
          for: {{ .Values.observability.prometheusRule.for | quote }}
          labels: { severity: critical }
          annotations:
            summary: Agentbay execution exceeded its persisted timeout
            description: "At least one active execution is overdue for tenant {{ "{{ $labels.tenant }}" }}."
        - alert: AgentbayScheduleStopped
          expr: max by (tenant, trigger_id) (agentbay_schedule_missed_intervals) >= {{ .Values.observability.prometheusRule.scheduleMissedIntervals }}
          for: {{ .Values.observability.prometheusRule.for | quote }}
          labels: { severity: critical }
          annotations:
            summary: Agentbay schedule stopped firing
            description: "Schedule {{ "{{ $labels.trigger_id }}" }} is past its expected next fire time."
        - alert: AgentbayObservabilityCollectorDown
          expr: (max(agentbay_observability_collector_up) == 0) or absent(agentbay_observability_collector_up)
          for: 5m
          labels: { severity: warning }
          annotations:
            summary: Agentbay PostgreSQL metric collection is failing
            description: Agentbay is serving the last successful durable-state snapshot.
---
{{- end }}
{{- if .Values.observability.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentbay.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentbay.labels" . | nindent 4 }}
    {{- toYaml .Values.observability.dashboard.labels | nindent 4 }}
data:
  agentbay-software-factory.json: |-
{{ .Files.Get "dashboards/agentbay-software-factory.json" | indent 4 }}
{{- end }}
{{- if .Values.observability.collector.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentbay.fullname" . }}-metrics-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentbay.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics-collector
data:
  collector.yaml: |-
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: agentbay
              metrics_path: /metrics
              scrape_interval: {{ .Values.observability.collector.scrapeInterval }}
              static_configs:
                - targets: [{{ printf "%s.%s.svc.cluster.local:%v" (include "agentbay.fullname" .) .Release.Namespace .Values.service.metricsPort | quote }}]
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 20
    exporters:
      prometheusremotewrite:
        endpoint: {{ required "observability.collector.remoteWriteEndpoint is required when the collector is enabled" .Values.observability.collector.remoteWriteEndpoint | quote }}
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, batch]
          exporters: [prometheusremotewrite]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentbay.fullname" . }}-metrics-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentbay.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agentbay.name" . }}-metrics-collector
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agentbay.name" . }}-metrics-collector
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: metrics-collector
    spec:
      automountServiceAccountToken: false
      containers:
        - name: collector
          image: {{ .Values.observability.collector.image | quote }}
          imagePullPolicy: {{ .Values.observability.collector.pullPolicy }}
          args: ["--config=/etc/collector/collector.yaml"]
          ports:
            - { name: health, containerPort: 13133, protocol: TCP }
          readinessProbe: { httpGet: { path: /, port: health } }
          livenessProbe: { httpGet: { path: /, port: health } }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }
          resources:
            {{- toYaml .Values.observability.collector.resources | nindent 12 }}
          volumeMounts:
            - { name: config, mountPath: /etc/collector, readOnly: true }
      volumes:
        - name: config
          configMap:
            name: {{ include "agentbay.fullname" . }}-metrics-collector
{{- end }}
