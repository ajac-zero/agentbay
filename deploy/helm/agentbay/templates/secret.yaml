{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "agentbay.fullname" .) -}}
{{- $existingAdminToken := "" -}}
{{- if and $existing $existing.data $existing.data.AGENTBAY_ADMIN_TOKEN -}}
{{- $existingAdminToken = $existing.data.AGENTBAY_ADMIN_TOKEN | b64dec -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentbay.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentbay.labels" . | nindent 4 }}
type: Opaque
stringData:
  AGENTBAY_ADMIN_TOKEN: {{ default (default (randAlphaNum 32) $existingAdminToken) .Values.admin.token | quote }}
  {{- range $key, $value := omit .Values.secrets.data "AGENTBAY_ADMIN_TOKEN" }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
