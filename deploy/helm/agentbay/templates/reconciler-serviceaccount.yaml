{{- if and .Values.reconciler.enabled .Values.reconciler.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentbay.reconciler.serviceAccountName" . }}
  namespace: {{ include "agentbay.claimsNamespace" . }}
  labels:
    {{- include "agentbay.labels" . | nindent 4 }}
    app.kubernetes.io/component: reconciler
  {{- with .Values.reconciler.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
