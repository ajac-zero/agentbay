{{- if .Values.runtimeSeed.enabled -}}
{{- if not (or .Values.secrets.create .Values.secrets.existingSecret) -}}
{{- fail "runtimeSeed.enabled requires secrets.create=true or secrets.existingSecret so AGENTBAY_ADMIN_TOKEN can be read" -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agentbay.fullname" . }}-runtime-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentbay.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: {{ join "," .Values.runtimeSeed.hookDeletePolicy | quote }}
spec:
  backoffLimit: {{ .Values.runtimeSeed.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "agentbay.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runtime-seed
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: runtime-seed
          image: "{{ .Values.runtimeSeed.image.repository }}:{{ .Values.runtimeSeed.image.tag }}"
          imagePullPolicy: {{ .Values.runtimeSeed.image.pullPolicy }}
          env:
            - name: AGENTBAY_RUNTIME_SEED_URL
              value: "http://{{ include "agentbay.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.service.port }}"
            - name: AGENTBAY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentbay.secretName" . }}
                  key: AGENTBAY_ADMIN_TOKEN
          command:
            - /bin/sh
            - -ec
          args:
            - |
              base_url="${AGENTBAY_RUNTIME_SEED_URL%/}"
              attempts={{ .Values.runtimeSeed.wait.attempts }}
              sleep_seconds={{ .Values.runtimeSeed.wait.seconds }}

              attempt=0
              until curl --fail --show-error --silent "$base_url/healthz" >/dev/null; do
                attempt=$((attempt + 1))
                if [ "$attempt" -ge "$attempts" ]; then
                  echo "agentbay did not become healthy at $base_url/healthz" >&2
                  curl --show-error --silent "$base_url/healthz" || true
                  exit 1
                fi
                sleep "$sleep_seconds"
              done

              curl_json() {
                method="$1"
                path="$2"
                curl \
                  --fail \
                  --show-error \
                  --silent \
                  --retry 5 \
                  --retry-connrefused \
                  --retry-delay 2 \
                  -X "$method" \
                  "$base_url$path" \
                  -H "Authorization: Bearer $AGENTBAY_ADMIN_TOKEN" \
                  -H "Content-Type: application/json" \
                  --data-binary @-
                printf '\n'
              }

              {{- range .Values.runtimeSeed.opencodeConfigs }}
              curl_json PUT "/admin/runtime/opencode-configs/{{ required "runtimeSeed.opencodeConfigs[].id is required" .id }}" <<'AGENTBAY_JSON'
              {{ . | toJson }}
              AGENTBAY_JSON
              {{- end }}
              {{- range .Values.runtimeSeed.sandboxProfiles }}
              curl_json PUT "/admin/runtime/sandbox-profiles/{{ required "runtimeSeed.sandboxProfiles[].id is required" .id }}" <<'AGENTBAY_JSON'
              {{ . | toJson }}
              AGENTBAY_JSON
              {{- end }}
              {{- range .Values.runtimeSeed.agentProfiles }}
              curl_json PUT "/admin/runtime/agent-profiles/{{ required "runtimeSeed.agentProfiles[].id is required" .id }}" <<'AGENTBAY_JSON'
              {{ . | toJson }}
              AGENTBAY_JSON
              {{- end }}
              {{- range .Values.runtimeSeed.bots }}
              curl_json PUT "/admin/runtime/bots/{{ required "runtimeSeed.bots[].id is required" .id }}" <<'AGENTBAY_JSON'
              {{ . | toJson }}
              AGENTBAY_JSON
              {{- end }}
              {{- range .Values.runtimeSeed.botAgentProfiles }}
              curl_json POST "/admin/runtime/bot-agent-profiles" <<'AGENTBAY_JSON'
              {{ . | toJson }}
              AGENTBAY_JSON
              {{- end }}
          {{- with .Values.runtimeSeed.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
