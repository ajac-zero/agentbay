{{- $secretName := include "agentbay.secretName" . -}}
{{- $useChartSecret := or .Values.secrets.create .Values.secrets.existingSecret -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentbay.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentbay.labels" . | nindent 4 }}
  {{- with .Values.extraAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentbay.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentbay.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "agentbay.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agentbay
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.orchestrator.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.orchestrator.port | quote }}
            - name: AGENTBAY_KUBE_NAMESPACE
              value: {{ include "agentbay.claimsNamespace" . | quote }}
            - name: AGENTBAY_SANDBOX_CLAIM_API_VERSION
              value: {{ .Values.claims.apiVersion | quote }}
            - name: AGENTBAY_OPENCODE_PORT
              value: {{ .Values.opencode.port | quote }}
            - name: AGENTBAY_OPENCODE_DIRECTORY
              value: {{ .Values.opencode.directory | quote }}
            - name: AGENTBAY_EXECUTION_MAINTENANCE_ENABLED
              value: {{ .Values.orchestrator.executionMaintenance.enabled | quote }}
            - name: AGENTBAY_EXECUTION_MAINTENANCE_INTERVAL_MS
              value: {{ .Values.orchestrator.executionMaintenance.intervalMs | quote }}
            - name: AGENTBAY_EXECUTION_MAINTENANCE_BATCH_SIZE
              value: {{ .Values.orchestrator.executionMaintenance.batchSize | quote }}
            - name: AGENTBAY_EXECUTION_MAX_ATTEMPTS
              value: {{ .Values.orchestrator.executionMaintenance.maxAttempts | quote }}
            - name: AGENTBAY_EXECUTION_RETRY_DELAY_MS
              value: {{ .Values.orchestrator.executionMaintenance.retryDelayMs | quote }}
            - name: AGENTBAY_DISPATCHER_ENABLED
              value: {{ .Values.orchestrator.dispatcher.enabled | quote }}
            - name: AGENTBAY_DISPATCHER_IDLE_POLL_MS
              value: {{ .Values.orchestrator.dispatcher.idlePollMs | quote }}
            - name: AGENTBAY_DISPATCHER_LEASE_DURATION_MS
              value: {{ .Values.orchestrator.dispatcher.leaseDurationMs | quote }}
            - name: AGENTBAY_DISPATCHER_RENEW_INTERVAL_MS
              value: {{ .Values.orchestrator.dispatcher.renewIntervalMs | quote }}
            - name: AGENTBAY_DISPATCHER_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- include "agentbay.databaseEnv" . | trim | nindent 12 }}
            {{- with .Values.orchestrator.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            {{- if $useChartSecret }}
            - secretRef:
                name: {{ $secretName }}
                optional: {{ not .Values.secrets.create }}
            {{- end }}
            {{- with .Values.orchestrator.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
