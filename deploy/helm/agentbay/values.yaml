# -- Default values for agentbay.
# -- Override any of these in your own values file passed to `helm install -f`.

# -- Optional override for the release short name used in resource names.
# -- Defaults to the chart name; truncated to 63 characters when combined with
# -- the release name.
nameOverride: ""

# -- Optional full override for the fully qualified app name.
# -- When set, this exact name is used for all resources.
fullnameOverride: ""

image:
  # -- Orchestrator container image repository.
  repository: ghcr.io/example/agentbay
  # -- Image tag. Defaults to the chart's appVersion when empty.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Image pull secrets used by the orchestrator and chart-managed Jobs.
imagePullSecrets: []

# -- Number of API replicas. Replicas share durable execution state in
# -- Postgres; execution submission does not depend on process-local state.
replicaCount: 1

# -- Resource requests and limits for the orchestrator container.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- Pod-level security context applied to the orchestrator Pod.
podSecurityContext: {}
# -- Container-level security context applied to the orchestrator container.
securityContext: {}

# -- Node selector applied to the orchestrator Pod.
nodeSelector: {}
# -- Tolerations applied to the orchestrator Pod.
tolerations: []
# -- Affinity rules applied to the orchestrator Pod.
affinity: {}

# -- Additional labels merged into every chart-managed resource.
extraLabels: {}
# -- Additional annotations merged into every chart-managed resource.
extraAnnotations: {}
# -- Additional annotations applied only to the orchestrator Pod template.
podAnnotations: {}

service:
  # -- Service type for the orchestrator.
  type: ClusterIP
  # -- Service port exposed in front of the orchestrator HTTP listener.
  port: 80
  # -- Internal metrics Service port. This port is not added to the Ingress.
  metricsPort: 9090

observability:
  # -- Add Prometheus scrape annotations to the orchestrator Pod.
  podAnnotations:
    enabled: false
    interval: 30s
  serviceMonitor:
    # -- Create a monitoring.coreos.com ServiceMonitor when the CRD is installed.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
  prometheusRule:
    # -- Create initial actionable alerts when the CRD is installed.
    enabled: false
    labels: {}
    outboxMaxAgeSeconds: 600
    # -- Regex of outbox topics with an active external publisher. Durable
    # -- internal wake hints remain visible on dashboards but do not page.
    outboxTopicsRegex: "github\\..+"
    scheduleMissedIntervals: 2
    for: 5m
  dashboard:
    # -- Create a Grafana sidecar-discovered dashboard ConfigMap.
    enabled: false
    labels:
      grafana_dashboard: "1"
  collector:
    # -- Deploy a dedicated OpenTelemetry Collector that scrapes only Agentbay.
    # -- Use when the cluster does not discover ServiceMonitor or Pod annotations.
    enabled: false
    image: otel/opentelemetry-collector-contrib@sha256:45392d534c1edcc809c2d112394029246bc679d2ae5ea7081414a1fc74f2c621
    pullPolicy: IfNotPresent
    scrapeInterval: 30s
    remoteWriteEndpoint: ""
    resources:
      requests: { cpu: 10m, memory: 64Mi }
      limits: { cpu: 100m, memory: 128Mi }

ingress:
  # -- Whether to create an Ingress for the execution API.
  enabled: false
  # -- IngressClass name. Leave empty to use the cluster default.
  className: ""
  # -- Annotations applied to the Ingress.
  annotations: {}
  # -- Hosts to route. Each entry can override its paths.
  hosts:
    - host: agentbay.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- TLS configuration for the Ingress.
  tls: []
  #  - secretName: agentbay-tls
  #    hosts:
  #      - agentbay.example.com

serviceAccount:
  # -- Whether to create the orchestrator ServiceAccount. Disable to use a
  # -- pre-existing ServiceAccount in the release namespace.
  create: true
  # -- Name of the ServiceAccount. Defaults to the chart fullname when empty.
  name: ""
  # -- Annotations applied to the ServiceAccount.
  annotations: {}

rbac:
  # -- Whether to create the Role and RoleBinding granting the orchestrator
  # -- access to SandboxClaim resources in `claims.namespace`.
  create: true

claims:
  # -- agent-sandbox extensions API version used by the orchestrator and
  # -- chart-managed SandboxTemplate / SandboxWarmPool resources. Use
  # -- `v1alpha1` is deprecated and should only be used with older controllers.
  apiVersion: v1beta1
  # -- Namespace where SandboxClaims are created by the orchestrator.
  # -- Defaults to the release namespace. The orchestrator's RBAC is scoped
  # -- to this namespace.
  namespace: ""
opencode:
  # -- Port exposed by `opencode serve` inside each sandbox Pod.
  port: 4096
  # -- Working directory used by the opencode instance inside the sandbox.
  directory: /workspace

# -- Optional Envoy AI Gateway integration. When enabled, the chart deploys
# -- the central agentbay-authz ext_authz service and adds a localhost proxy
# -- sidecar plus a projected service account token to chart-managed
# -- SandboxTemplates. Leave disabled only when immutable profiles use another
# -- operator-managed credential path.
aiGatewayAuthz:
  enabled: false
  # -- Envoy AI Gateway base URL used by the sandbox-local proxy sidecar.
  upstreamBaseURL: http://ai-gateway.default.svc.cluster.local
  # -- Optional Host header sent by the proxy. Empty uses the host from
  # -- `upstreamBaseURL`.
  upstreamHost: ""
  # -- Audience for projected sandbox service account tokens and TokenReview.
  tokenAudience: ai-gateway
  # -- Projected token lifetime in seconds.
  tokenExpirationSeconds: 600
  # -- Optional loopback hostnames added to sandbox Pods via hostAliases.
  # -- This permits URLs such as `http://agentbay-gateway:8080/v1`.
  localhostHostnames:
    - agentbay-gateway
  networkPolicy:
    egress:
      # -- Add an egress rule from chart-managed sandbox templates to Envoy AI Gateway.
      enabled: true
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
      podSelector: {}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
  # -- ServiceAccount used by sandbox Pods for projected gateway tokens.
  sandboxServiceAccount:
    create: true
    name: sandbox-runtime
    annotations: {}
  proxy:
    image:
      repository: ghcr.io/example/agentbay-gateway-proxy
      tag: latest
      pullPolicy: IfNotPresent
    # -- Loopback listener inside each sandbox Pod.
    listenAddr: 127.0.0.1:8080
    port: 8080
    tokenMountPath: /var/run/agentbay-ai-gateway
    stripHeaders: []
    resources: {}
  authz:
    image:
      repository: ghcr.io/example/agentbay-authz
      tag: latest
      pullPolicy: IfNotPresent
    replicaCount: 2
    bindAddr: ":9000"
    httpAddr: ":9001"
    serviceAccount:
      create: true
      name: ""
      annotations: {}
    rbac:
      create: true
    requirePodBinding: true
    requireSandboxOwner: true
    requireSandboxClaim: true
    requireClaimUID: true
    trustClaimMetadata: false
    trustPodMetadata: false
    requiredPodLabels: agentbay.dev/managed-by=agentbay
    # -- SandboxClaim API version passed to the authz sidecar. Empty uses `claims.apiVersion`.
    sandboxClaimAPIVersion: ""
    # -- Core Sandbox API version passed to the authz sidecar.
    sandboxAPIVersion: v1alpha1
    defaultAction: deny
    policy: |
      defaultAction: deny
      rules:
        - name: allow-agentbay-managed-sandboxes
          namespaces:
            - "*"
          serviceAccounts:
            - sandbox-runtime
    resources: {}

orchestrator:
  # -- Port the orchestrator HTTP server listens on.
  port: 3000
  # -- URL injected only into trusted sidecars for fenced internal callbacks.
  # Defaults to the chart-managed in-cluster Service when empty.
  controlPlaneUrl: ""
  executionMaintenance:
    # -- Reconcile expired execution leases and due retries in each orchestrator replica.
    enabled: true
    # -- Delay between maintenance cycles.
    intervalMs: 5000
    # -- Maximum executions processed by each operation in one cycle.
    batchSize: 100
    # -- Maximum number of attempts, including the initial attempt.
    maxAttempts: 3
    # -- Fixed delay before an execution becomes eligible for retry.
    retryDelayMs: 30000
  dispatcher:
    # -- Claim queued executions and run them in attempt-scoped SandboxClaims.
    enabled: true
    # -- Delay before polling again when no execution is queued.
    idlePollMs: 500
    # -- Duration of the fenced execution lease.
    leaseDurationMs: 60000
    # -- Lease renewal interval; must be less than leaseDurationMs.
    renewIntervalMs: 20000
  revisionResolver:
    # -- Resolve GitHub issue default-branch revisions before binding admission.
    enabled: false
    idlePollMs: 500
    leaseDurationMs: 60000
    retryDelayMs: 30000
    maxAttempts: 5
    requestTimeoutMs: 30000
    # -- Existing Secret containing `app-id` and `private-key.pem` keys.
    credentialsSecret: ""
    mountPath: /var/run/agentbay/github-app
  githubIssueAcknowledgment:
    # -- Add an eyes reaction after durable issues.opened admission and before execution provisioning.
    enabled: false
    idlePollMs: 250
    leaseDurationMs: 60000
    retryDelayMs: 5000
    requestTimeoutMs: 30000
  scheduleWorker:
    # -- Materialize and deliver durable schedule.cron occurrences.
    enabled: false
    idlePollMs: 1000
    leaseDurationMs: 60000
    retryDelayMs: 30000
    maxAttempts: 5
    materializeBatchSize: 100
  # -- Extra orchestrator env vars expressed as a Kubernetes `env` list. For
  # -- sensitive values, use `valueFrom.secretKeyRef`; for example, expose a
  # -- GitHub webhook secret here so it is available only to the orchestrator
  # -- serving the public webhook endpoint, not migrations or the reconciler.
  extraEnv: []
  #  - name: LOG_LEVEL
  #    value: debug
  #  - name: AGENTBAY_GITHUB_WEBHOOK_SECRET_PRODUCTION
  #    valueFrom:
  #      secretKeyRef:
  #        name: agentbay-github-webhook
  #        key: webhook-secret
  # -- Extra `envFrom` entries appended after the chart-managed Secret. Use
  # -- this to layer in additional ConfigMaps or Secrets you manage outside
  # -- this chart.
  extraEnvFrom: []
  #  - configMapRef:
  #      name: my-extra-config

admin:
  # -- Bearer token for authenticated `/v1/*` execution API routes. When empty and this chart
  # -- creates its own Secret, Helm generates a token and preserves it across
  # -- upgrades. Existing Secrets should provide AGENTBAY_ADMIN_TOKEN directly.
  token: ""

migrations:
  # -- Run Drizzle database migrations from a Helm hook Job instead of
  # -- from orchestrator startup.
  enabled: true
  # -- Override Helm hook events. By default, external databases use
  # -- pre-install/pre-upgrade. The chart-managed Postgres default leaves this
  # -- empty and renders migrations as a normal Job so app readiness can wait on
  # -- the migrated schema without deadlocking Helm post-install hooks.
  hookEvents: []
  # -- Helm hook weight for the migration Job.
  hookWeight: -10
  # -- Helm hook delete policy. Failed Jobs are intentionally kept so their
  # -- logs remain available for troubleshooting.
  hookDeletePolicy:
    - before-hook-creation
    - hook-succeeded
  backoffLimit: 6
  # -- Extra migration Job env vars expressed as a name/value list.
  extraEnv: []
  # -- Extra `envFrom` entries for externally managed ConfigMaps or Secrets.
  # -- Pre-install migration hooks cannot read chart-managed Secrets because
  # -- normal release resources do not exist yet.
  extraEnvFrom: []
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

secrets:
  # -- Whether the chart should create a Secret containing the orchestrator
  # -- env vars listed in `secrets.data`. Set to false to use an existing
  # -- Secret managed outside this chart.
  create: true
  # -- Name of an existing Secret to mount as `envFrom`. When set, the chart
  # -- will not create a Secret of its own. The Secret must live in the
  # -- release namespace and contain env vars under their canonical names
  # -- (e.g. AGENTBAY_ADMIN_TOKEN or provider credentials).
  existingSecret: ""
  # -- Inline secret data. Each key becomes an env var of the same name on
  # -- the orchestrator container via `envFrom`. Leave empty and reference
  # -- an existing Secret instead if you do not want plaintext values in
  # -- your values file.
  data: {}
  #  AGENTBAY_ADMIN_TOKEN: replace-me
  #  ANTHROPIC_API_KEY: sk-ant-...

database:
  # -- Enable an in-cluster Postgres Deployment for durable execution state.
  # -- When false, use database.external or provide AGENTBAY_DATABASE_URL via secrets.
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    # -- Database user for the in-cluster Postgres instance.
    username: agentbay
    # -- Database name for the in-cluster Postgres instance.
    database: agentbay
    # -- Password for the in-cluster Postgres instance. Change for production.
    password: agentbay
  # -- Persistence for in-cluster Postgres. When disabled, Postgres uses an
  # -- emptyDir and execution data is lost on Pod restart.
  persistence:
    enabled: false
    size: 8Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
  # -- Resource requests and limits for the in-cluster Postgres container.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # -- Set AGENTBAY_DATABASE_SSL=true for Postgres providers that require SSL.
  ssl: false
  # -- Use an external Postgres instead of the in-cluster one. Ignored when
  # -- `database.enabled` is true. Set exactly one of `url` or `existingSecret`.
  external:
    # -- Full postgres:// URL passed to the orchestrator as AGENTBAY_DATABASE_URL.
    url: ""
    # -- Reference an existing Secret containing the Postgres URL.
    # -- Use this instead of secrets.data.AGENTBAY_DATABASE_URL when migrations
    # -- are enabled so the migration Job can read the URL before install.
    existingSecret: ""
    # -- Key inside `existingSecret` whose value is the Postgres URL.
    existingSecretKey: AGENTBAY_DATABASE_URL

# -- Manage SandboxTemplate resources from this chart. Disabled by default
# -- because the agent-sandbox CRDs must be installed in the cluster first
# -- and some platforms prefer to manage templates through GitOps or policy
# -- engines (OPA, Kyverno).
sandboxTemplates:
  # -- Whether to render any SandboxTemplate resources.
  enabled: false
  # -- One entry per template. Each entry deep-merges over the built-in
  # -- defaults documented in `templates/_sandbox-template-defaults.tpl`.
  templates:
    - name: opencode-template
      # -- Namespace for the template. Defaults to claims.namespace.
      namespace: ""
      image:
        repository: ghcr.io/example/opencode-sandbox
        tag: latest
        pullPolicy: IfNotPresent
      # -- Port `opencode serve` listens on inside the sandbox Pod. Must
      # -- match `opencode.port` on the orchestrator.
      port: 4096
      workingDir: /workspace
      command: ["opencode"]
      args: ["serve", "--hostname", "0.0.0.0", "--port", "4096"]
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 4Gi
      # -- Workspace volume mounted at `workingDir`. Use `emptyDir` for
      # -- ephemeral sessions or `persistentVolumeClaim` for PVC-backed
      # -- session continuity (see DESIGN.md §8 D5).
      workspace:
        type: emptyDir
        size: 1Gi
        storageClassName: ""
      # -- The chart materializes a claim's Git workspace before OpenCode starts.
      # -- By default this init container uses the sandbox image above. Set any
      # -- image field here only when the materializer is published separately.
      workspaceMaterializer:
        image:
          repository: ""
          tag: ""
          pullPolicy: ""
      # -- SandboxTemplate.spec.envVarsInjectionPolicy. Must be `Allowed`
      # -- for the orchestrator to inject per-claim authorization and runtime
      # -- configuration via `claim.spec.env`. Secret values must not be placed
      # -- in claim env.
      envVarsInjectionPolicy: Allowed
      # -- SandboxTemplate.spec.service. Required for the orchestrator to
      # -- reach the Pod via DNS.
      service: true
      # -- SandboxTemplate.spec.networkPolicyManagement.
      networkPolicyManagement: Managed
      networkPolicy:
        # -- Auto-render an ingress rule that only allows traffic from the
        # -- orchestrator Pods this chart deploys. Selectors are templated
        # -- from the orchestrator's labels so they cannot drift.
        ingressFromOrchestrator: true
        # -- Extra `ingress` rules appended verbatim to the policy.
        extraIngress: []
        egress:
          # -- Allow egress to kube-dns on UDP/TCP 53.
          allowDNS: true
          # -- Allow egress to all public IPv4 except RFC1918 + link-local.
          allowInternetExceptPrivate: true
          # -- Allow trusted sidecar callbacks to the orchestrator HTTP port.
          allowControlPlane: true
          # -- Extra `egress` rules appended verbatim to the policy.
          extra: []
      # -- Extra container `env` entries appended to the opencode container.
      extraEnv: []
      # -- Extra volume mounts appended to the opencode container.
      extraVolumeMounts: []
      # -- Additional containers appended to the sandbox Pod. Useful for local
      # -- authz/proxy sidecars that expose model, API, or MCP gateways on
      # -- localhost. Connection profiles may select only sidecars already
      # -- owned by this template. Claim env injection forces cold starts from
      # -- the profile's concrete v1beta1 SandboxWarmPool.
      # -- Provider-specific stacks belong in dedicated examples. See
      # -- examples/github-software-factory for the GitHub MCP and broker stack.
      sidecars: []
      # -- Additional volumes appended to the sandbox Pod. Use with `sidecars`
      # -- for projected tokens, config, sidecar-specific state, or a static
      # -- operator-managed Secret fallback. Mount credential volumes only on
      # -- their sidecar through `sidecars[].volumeMounts`; do not add them to
      # -- OpenCode through `extraVolumeMounts`.
      extraVolumes: []
      # -- Pod-level overrides applied under spec.podTemplate.spec. User init
      # -- containers are appended after the workspace materializer, and Pod
      # -- security-context fields override the chart defaults. The chart owns
      # -- containers, initContainers, volumes, restartPolicy,
      # -- automountServiceAccountToken, and securityContext; it also owns
      # -- serviceAccountName and hostAliases when aiGatewayAuthz is enabled.
      # -- Set other PodSpec fields here.
      podSpecOverrides: {}
      # -- Container-level overrides applied under the opencode container.
      # -- securityContext fields merge with the chart's restricted defaults.
      containerOverrides: {}
      # -- Full takeover of spec. When set, everything above is ignored and
      # -- this object is used as `spec` exactly.
      specOverride: {}

# -- Manage SandboxWarmPool resources from this chart. Disabled by default
# -- for the same reason as `sandboxTemplates`.
sandboxWarmPools:
  # -- Whether to render any SandboxWarmPool resources.
  enabled: false
  pools:
    - name: opencode-default
      # -- Namespace for the warmpool. Defaults to claims.namespace.
      namespace: ""
      # -- Name of the SandboxTemplate this pool replenishes.
      sandboxTemplateRef: opencode-template
      replicas: 0
      updateStrategy:
        type: OnReplenish

reconciler:
  # -- Whether to deploy the reconciler CronJob. The reconciler lists
  # -- agentbay-managed SandboxClaims and deletes any that have exceeded their
  # -- shutdownTime plus the configured grace period.
  enabled: true
  # -- CronJob schedule expression. Runs every 30 minutes by default.
  schedule: "*/30 * * * *"
  # -- concurrencyPolicy for the CronJob. Forbid prevents overlapping runs.
  concurrencyPolicy: Forbid
  # -- Minutes of grace time added to spec.lifecycle.shutdownTime before a
  # -- claim is eligible for deletion. Corresponds to AGENTBAY_RECONCILER_GRACE_MINUTES.
  graceMinutes: 30
  # -- Number of successful CronJob runs to retain in history.
  successfulJobsHistoryLimit: 3
  # -- Number of failed CronJob runs to retain in history.
  failedJobsHistoryLimit: 3
  serviceAccount:
    # -- Whether to create the reconciler ServiceAccount.
    create: true
    # -- Name of the reconciler ServiceAccount. Defaults to <fullname>-reconciler.
    name: ""
    # -- Annotations applied to the reconciler ServiceAccount.
    annotations: {}
  rbac:
    # -- Whether to create the Role and RoleBinding granting the reconciler
    # -- list and delete access to SandboxClaims in claims.namespace.
    create: true
  # -- Resource requests and limits for the reconciler container. Empty means no limits.
  resources: {}
  # -- Extra env vars appended to the reconciler container.
  extraEnv: []
  # -- Extra envFrom entries for the reconciler container.
  extraEnvFrom: []

# -- Readiness probe configuration for the orchestrator container.
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10

# -- Liveness probe configuration for the orchestrator container.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
