apiVersion: v2
name: agentbay
description: |
  agentbay provides an API for durable asynchronous agent executions backed by
  Postgres and isolated Kubernetes sandboxes. This chart installs the API,
  migration and execution-maintenance configuration, SandboxClaim RBAC,
  optional in-cluster Postgres, optional SandboxTemplate and SandboxWarmPool
  resources, reconciler, AI gateway authorization, and Ingress.
type: application
version: 0.1.0
appVersion: "1.0.0"
home: https://github.com/ajac-zero/agentbay
sources:
  - https://github.com/ajac-zero/agentbay
keywords:
  - agents
  - opencode
  - sandbox
  - execution
maintainers: []
