apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentbay
  namespace: agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentbay-sandboxclaims
  namespace: agents
rules:
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxclaims"]
    verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentbay-sandboxclaims
  namespace: agents
subjects:
  - kind: ServiceAccount
    name: agentbay
    namespace: agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agentbay-sandboxclaims
