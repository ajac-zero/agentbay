apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: ${SANDBOX_TEMPLATE_NAME}
  namespace: ${NAMESPACE}
spec:
  podTemplate:
    spec:
      containers:
        - name: opencode
          image: ${OPENCODE_IMAGE}
          command: ["opencode", "serve", "--port", "${SANDBOX_PORT}"]
          ports:
            - containerPort: ${SANDBOX_PORT}
          readinessProbe:
            httpGet:
              path: /
              port: ${SANDBOX_PORT}
            initialDelaySeconds: 0
            periodSeconds: 1
          livenessProbe:
            httpGet:
              path: /
              port: ${SANDBOX_PORT}
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
      restartPolicy: OnFailure
